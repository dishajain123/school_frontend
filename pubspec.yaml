name: sms_app
description: School Management System — Flutter Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP Client
  dio: ^5.4.3

  # Navigation
  go_router: ^13.2.1

  # Secure Storage
  flutter_secure_storage: ^10.0.0

  # Local Persistence
  shared_preferences: ^2.2.3

  # Fonts
  google_fonts: ^6.2.1

  # UI Utilities
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # File Handling
  file_picker: ^8.0.3
  image_picker: ^1.1.2

  # PDF
  syncfusion_flutter_pdfviewer: ^33.1.46

  # WebSocket
  web_socket_channel: ^3.0.1

  # Formatting
  intl: ^0.19.0

  # Permissions
  permission_handler: ^11.3.1

  # Icons (extended material icons)
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true